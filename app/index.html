<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calorie Correct — The honest calorie counter</title>
<meta name="description" content="The honest calorie counter that calibrates to your real weight loss.">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="stylesheet" href="styles.css">
<script src="chart.umd.min.js"></script>
</head>
<body>

<header class="top-bar">
  <a class="top-bar-brand" href="/">
    <img src="cc-logo.png" alt="Calorie Correct" class="brand-logo" />
    <div class="brand-tag">Accurate Tracking. Balanced Living.</div>
  </a>
</header>

<div class="layout">

  <!-- ================ Sidebar (desktop) ================ -->
  <aside class="sidebar">
    <button class="profile-btn" id="profile-btn">
      <div class="profile-avatar" id="user-avatar">S</div>
      <div class="profile-info">
        <div class="profile-name" id="user-name">Average Joe</div>
        <div class="profile-sublabel">Profile &amp; settings</div>
      </div>
      <svg class="profile-arrow" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>

    <button class="weighin-btn" id="weighin-btn">
      <span class="weighin-icon">+</span>
      <span>Weigh in</span>
    </button>

    <div class="sidebar-divider"></div>

    <nav class="nav" id="desktop-nav">
      <button class="nav-item" data-view="home">
        <svg viewBox="0 0 24 24" class="nav-icon"><path d="M21 12a9 9 0 01-9 9c-1.6 0-3-.4-4.3-1L3 21l1-4.7A9 9 0 1121 12z"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-view="progress">
        <svg viewBox="0 0 24 24" class="nav-icon"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
        <span>Progress</span>
      </button>
      <button class="nav-item" data-view="methodology">
        <svg viewBox="0 0 24 24" class="nav-icon"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>Methodology</span>
      </button>
    </nav>
  </aside>

  <!-- ================ Main content ================ -->
  <main class="main">
    <div class="view-container" id="view-container">
      <!-- Views render here -->
    </div>
  </main>

  <!-- ================ Mobile bottom tabs ================ -->
  <nav class="mobile-tabs" id="mobile-nav">
    <button class="m-tab" data-view="home">
      <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9c-1.6 0-3-.4-4.3-1L3 21l1-4.7A9 9 0 1121 12z"/></svg>
      <span>Home</span>
    </button>
    <button class="m-tab" data-view="progress">
      <svg viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
      <span>Progress</span>
    </button>
    <button class="m-tab" data-view="methodology">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span>About</span>
    </button>
  </nav>

</div>

<!-- Modal layer -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <!-- Modal content rendered dynamically -->
  </div>
</div>

<!-- Toast layer -->
<div class="toast-container" id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
