<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calorie Correct — The honest calorie counter</title>
<meta name="description" content="The honest calorie counter that calibrates to your real weight loss.">
<meta name="theme-color" content="#446957">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Calorie Correct">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="mobile-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<script src="chart.umd.min.js"></script>
</head>
<body>

<header class="top-bar">
  <a class="top-bar-brand" href="/">
    <img src="cc-logo.png" alt="Calorie Correct" class="brand-logo" />
    <div class="brand-tag">Accurate Tracking. Balanced Living.</div>
  </a>
</header>

<div class="layout">

  <!-- ================ Left sidebar — profile + weigh-in ================ -->
  <aside class="sidebar">
    <!-- Hamburger menu (mobile only) — opens nav drawer -->
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <button class="profile-btn" id="profile-btn">
      <div class="profile-avatar" id="user-avatar">S</div>
      <div class="profile-info">
        <div class="profile-name" id="user-name">Average Joe</div>
        <div class="profile-sublabel">Profile &amp; settings</div>
      </div>
      <svg class="profile-arrow" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>

    <button class="weighin-btn" id="weighin-btn">
      <span class="weighin-icon">+</span>
      <span>Weigh in</span>
    </button>
  </aside>

  <!-- ================ Center — Coach chat + Results ================ -->
  <main class="main">
    <div class="view-container" id="view-container">
      <!-- Center column rendered here -->
    </div>
  </main>

  <!-- ================ Right panel — Today's log ================ -->
  <aside class="right-panel">
    <div class="right-panel-content" id="right-panel-content">
      <!-- Today's log + macros + date nav rendered here -->
    </div>
  </aside>

</div>

<!-- Mobile nav drawer — opened by hamburger button (mobile only) -->
<div class="mobile-drawer-backdrop" id="mobile-drawer-backdrop">
  <nav class="mobile-drawer" id="mobile-drawer">
    <div class="mobile-drawer-header">
      <span class="mobile-drawer-title">Menu</span>
      <button class="mobile-drawer-close" id="mobile-drawer-close" aria-label="Close menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
      </button>
    </div>
    <button class="m-tab" data-mobile-tab="diary">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span>Log</span>
    </button>
    <button class="m-tab" data-mobile-tab="results">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
      <span>Results</span>
    </button>
  </nav>
</div>

<!-- Modal layer -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <!-- Modal content rendered dynamically -->
  </div>
</div>

<!-- Toast layer -->
<div class="toast-container" id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
