<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in… — Calorie Correct</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="favicon.png">
<style>
  :root {
    --primary: #769B6C;
    --primary-dark: #446957;
    --bg: #F5F1EA;
    --card: #FFFFFF;
    --border: #ECE5D8;
    --text: #2C2826;
    --text-soft: #4A4540;
    --muted: #8A8278;
    --warn: #B8543A;
    --serif: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 4px 16px rgba(15, 30, 22, 0.06);
  }
  .logo {
    font-family: var(--serif);
    color: var(--primary-dark);
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  .spinner {
    margin: 8px auto 16px;
    width: 28px; height: 28px;
    border: 3px solid #EAF0EC;
    border-top-color: var(--primary-dark);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status {
    font-size: 15px;
    color: var(--text-soft);
    line-height: 1.5;
  }
  .err { color: var(--warn); }
  .btn {
    display: inline-block;
    background: var(--primary-dark);
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    margin-top: 20px;
    font-size: 14px;
  }
  .btn:hover { background: var(--primary); }
  .btn-secondary {
    background: transparent;
    color: var(--primary-dark);
    border: 1px solid var(--border);
    margin-left: 8px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Calorie Correct</div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Signing you in…</div>
</div>
<script>
  // This page handles the redirect-back from sign-in flows:
  //   ?magic=<token>     — magic link from email; verify with worker
  //   #session=<token>   — Google OAuth callback (token in URL fragment)
  //
  // Either way, it stashes the resulting session_token in localStorage as
  // 'cc_session' and bounces to the app. The app reads it on load and
  // includes it as Authorization: Bearer <token> on every Worker request.

  const WORKER_URL = 'https://calorie-correct-coach.calorie-correct.workers.dev';
  const STATUS = document.getElementById('status');
  const SPINNER = document.getElementById('spinner');

  function showError(msg) {
    SPINNER.style.display = 'none';
    STATUS.className = 'status err';
    STATUS.innerHTML = msg + '<br><a href="/app/" class="btn">Open app</a>' +
                       '<a href="/" class="btn btn-secondary">Back to home</a>';
  }

  function finishSignIn(sessionToken) {
    try { localStorage.setItem('cc_session', sessionToken); }
    catch (e) { showError('Could not save session — your browser may be blocking storage.'); return; }
    location.href = '/app/';
  }

  async function run() {
    const params = new URLSearchParams(location.search);
    const hashParams = new URLSearchParams(location.hash.slice(1));

    const session = hashParams.get('session');
    if (session) {
      // Direct session token from Google OAuth — store and bounce.
      // Clean the URL fragment first so we don't leave the token in history.
      history.replaceState({}, '', '/auth.html');
      finishSignIn(session);
      return;
    }

    const magic = params.get('magic');
    if (magic) {
      try {
        const res = await fetch(WORKER_URL + '/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: magic }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.session_token) {
          showError(data.error || 'Sign-in link is invalid or expired.');
          return;
        }
        finishSignIn(data.session_token);
      } catch (e) {
        showError('Network error. Check your connection and try again.');
      }
      return;
    }

    showError('No sign-in token found. Try requesting a new sign-in link.');
  }

  run();
</script>
</body>
</html>
