---
deployment:
  tasks:
    # The web root on Bluehost for the caloriecorrect.com addon domain.
    # NOTE: This is /caloriecorrect.com/, NOT /public_html/. The latter is the
    # docroot for the primary domain (sethimming.com). Addon domains have
    # their own separate docroots under the home directory.
    - export DEPLOYPATH=/home4/sethimmi/caloriecorrect.com/
    # Copy the landing page
    - /bin/cp -R index.html $DEPLOYPATH
    # Static legal/auth pages at the site root
    - /bin/cp -R privacy.html $DEPLOYPATH
    - /bin/cp -R terms.html $DEPLOYPATH
    - /bin/cp -R auth.html $DEPLOYPATH
    # Copy the logo and favicon at the project root (used by the landing page)
    - /bin/cp -R cc-logo.png $DEPLOYPATH
    - /bin/cp -R favicon.png $DEPLOYPATH
    # Copy the app folder (with all its contents — includes its own logo/favicon)
    - /bin/cp -R app $DEPLOYPATH
